# retired-skills.yaml — Retired/removed skills from the project
#
# List of skills that WERE PART OF the project but are no longer in
# the current `skills/` directory. `syncSkillsFromClone` reads this file and removes
# stale copies from `~/.agents/skills/` on next session_start.
#
# Lives at project root (not inside skills/) because it is consumed
# by ops code (sync-skills.ts), never by the LLM at runtime.
#
# Entry format:
#   - name:           (required) retired skill name
#     retired_at:     (optional)   ISO 8601 retirement date
#     reason:         (optional)   superseded | renamed | merged | deleted | experimental
#     superseded_by:  (optional)   list of skills that replace this one
#     note:           (optional)   free text explaining context
#
# Only `name` is required — sync works even with minimal entries.

version: 1

retired:
  - name: cali-product-workflow
    retired_at: 2026-06-24
    reason: renamed
    superseded_by:
      - stelow-product-orchestrator
    note: |
      Renamed in 2026-06-19 (commit 8c6363e "feat: rename product to stelow").
      The legacy skill writes artifacts to .cali-product-workflow/ (old path).
      The current extension/CLI (v0.36.2) writes to .stelow/. If you have a copy
      of this skill in ~/.agents/skills/, it will produce workflows in the wrong path.
      Delete it or re-run install.sh so the prune removes it.

  - name: cali-product-critique
    retired_at: 2026-05-29
    reason: superseded
    superseded_by:
      - cali-product-plan-critique
      - cali-product-codebase-critique
      - cali-product-ux-critique
      - cali-product-execution-critique
    note: |
      Original monolithic skill was split into 4 domain-specific
      skills (plan, codebase, ux, execution). Each covers
      a distinct input (spec, code, URL, post-impl) and generates
      classified gap reports.

  - name: cali-product-interface-brainstorm
    retired_at: 2026-05-31
    reason: renamed
    superseded_by:
      - cali-product-interface-alternatives
    note: |
      Renamed in f3f707a as part of gap A (1 source = 1 truth).
      Content and semantics preserved; only the name changed.

  - name: stelow
    retired_at: 2026-06-22
    reason: renamed
    superseded_by:
      - stelow-product-orchestrator
    note: |
      Renamed to stelow-product-orchestrator to follow the
      cali-product-* convention and clarify orchestrator role.
